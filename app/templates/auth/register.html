{% extends "layout/base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<section class="login-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="login-card">

<h2>Create Account</h2>

<p class="text-muted">

Join PaveSense AI

</p>

<form action="{{ url_for('dashboard.home') }}">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Phone Number</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
required>

</div>

<div class="mb-4">

<label>Confirm Password</label>

<input
type="password"
class="form-control"
required>

</div>

<button class="btn login-btn w-100">

Create Account

</button>

</form>

<div class="text-center mt-4">

Already have an account?

<a href="{{ url_for('auth.login') }}">

Login

</a>

</div>

</div>

</div>

</div>

</div>

</section>

{% endblock %}
