{% extends "layout/base.html" %}

{% block title %}
Road Details
{% endblock %}

{% block content %}

<section class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="progress mb-4" style="height:10px;">
<div class="progress-bar bg-success" style="width:55%;"></div>
</div>

<p class="text-muted">Step 4 of 8 • Road Details</p>

<div class="feature-card">

<h2 class="mb-4 text-center">
🛣 Road Details
</h2>

<form action="{{ url_for('complaint.incident') }}">

<div class="mb-4">

<label class="form-label">

Road Type

</label>

<select id="roadType" class="form-select">

<option selected disabled>Select Road Type</option>

<option value="NH">National Highway</option>

<option value="SH">State Highway</option>

<option value="Urban">Urban Road</option>

<option value="Rural">Rural Road</option>

</select>

</div>

<div id="nhField" style="display:none;">

<label>National Highway Number</label>

<input class="form-control mb-3"
placeholder="NH66">

</div>

<div id="shField" style="display:none;">

<label>State</label>

<select class="form-select mb-3">

<label>State</label>

<select class="form-select mb-3">

<option selected disabled>Select State / Union Territory</option>

<!-- States -->
<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>

<!-- Union Territories -->
<option>Andaman and Nicobar Islands</option>
<option>Chandigarh</option>
<option>Dadra and Nagar Haveli and Daman and Diu</option>
<option>Delhi (NCT)</option>
<option>Jammu and Kashmir</option>
<option>Ladakh</option>
<option>Lakshadweep</option>
<option>Puducherry</option>

</select>

<label>State Highway Number</label>

<input
type="text"
class="form-control"
placeholder="Example: SH-1">

</select>

<label>State Highway Number</label>

<input class="form-control"
placeholder="SH 1">

</div>

<div class="mt-5 d-flex justify-content-between">

<a href="{{ url_for('complaint.address') }}"
class="btn btn-outline-secondary">

← Previous

</a>

<button class="btn btn-success">

Next →

</button>

</div>

</form>

</div>

</div>

</div>

</section>

<script>

const road=document.getElementById("roadType");

road.onchange=function(){

document.getElementById("nhField").style.display="none";

document.getElementById("shField").style.display="none";

if(this.value==="NH")

document.getElementById("nhField").style.display="block";

if(this.value==="SH")

document.getElementById("shField").style.display="block";

}

</script>

{% endblock %}
