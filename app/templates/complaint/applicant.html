{% extends "layout/base.html" %}

{% block title %}
Applicant Details
{% endblock %}

{% block content %}

<section class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="mb-5">

<div class="progress" style="height:10px;">

<div
class="progress-bar bg-success"
style="width:25%;">

</div>

</div>

<p class="mt-2 text-muted">

Step 2 of 8 • Applicant Details

</p>

</div>

<div class="feature-card">

<h2 class="text-center mb-5">

👤 Applicant Details

</h2>

<form action="{{ url_for('complaint.address') }}">

<div class="mb-3">

<label>

Full Name

</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Email Address

</label>

<input
type="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Phone Number

</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="mb-4">

<label>

Applying For

</label>

<select class="form-select">

<option>

Self

</option>

<option>

Someone Else

</option>

<option>

Joint Petition

</option>

</select>

</div>

<div class="d-flex justify-content-between">

<a
href="{{ url_for('complaint.upload') }}"
class="btn btn-outline-secondary">

← Previous

</a>

<button
class="btn btn-success px-5">

Next →

</button>

</div>

</form>

</div>

</div>

</div>

</section>

{% endblock %}
